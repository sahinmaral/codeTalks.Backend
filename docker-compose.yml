name: codetalks

services:
  postgres:
    image: postgres:16
    container_name: codetalks-postgres
    environment:
      POSTGRES_DB: codeTalksDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Abc1234."
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
